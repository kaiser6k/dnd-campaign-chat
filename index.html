<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>D&D Campaign Chat – Supabase Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--
    Supabase JS v2 — UMD bundle via jsDelivr (reliable, no ESM/module race condition).
    This exposes window.supabase.createClient as a plain global.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fbfbf9;
      --surface-2: #f3f0ec;
      --border: #d4d1ca;
      --text: #28251d;
      --text-muted: #7a7974;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06);
      max-width: 960px;
      width: 100%;
      padding: 24px 24px 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: 600;
      font-size: 18px;
    }

    .status-pill {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    .grid { display: grid; gap: 8px; }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 8px;
    }

    label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    button.btn {
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
    }

    .btn.primary { background: var(--primary); color: #f9f8f4; }
    .btn.primary:hover { background: var(--primary-hover); transform: translateY(-0.5px); }

    .btn.secondary { background: var(--surface-2); color: var(--text-muted); }
    .btn.secondary:hover { background: var(--surface-2); color: var(--text); transform: translateY(-0.5px); }

    .btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none; }

    .help {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    #message {
      margin-top: 10px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      display: none;
      word-break: break-word;
    }

    #message.ok  { background: #d4dfcc; color: #1e3f0a; display: block; }
    #message.err { background: #e0ced7; color: #561740; display: block; }

    @media (max-width: 720px) {
      .card { margin: 16px; padding: 20px 16px 16px; }
      .grid-2 { grid-template-columns: minmax(0, 1fr); }
      .btn-row { grid-template-columns: minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="card-header">
      <div class="card-title">D&amp;D Campaign Chat</div>
      <div id="statusPill" class="status-pill">Logged out</div>
    </header>

    <section>
      <h2>Sign in or create account</h2>

      <div class="grid grid-2" style="margin-bottom: 8px;">
        <div>
          <label for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" type="url" placeholder="https://YOUR-REF.supabase.co" />
        </div>
        <div>
          <label for="supabaseKey">Anon (publishable) key</label>
          <input id="supabaseKey" type="text" placeholder="sb_publishable_... or eyJ..." />
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom: 4px;">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="signinBtn">Sign in</button>
        <button class="btn secondary" id="signupBtn">Create account</button>
      </div>

      <p class="help">
        Enter your Supabase project URL and anon key, then sign in or create an account.
      </p>

      <div id="message"></div>
    </section>
  </main>

  <script>
    // --- Supabase client init check ---
    // The UMD bundle exposes window.supabase (with .createClient) synchronously.
    if (!window.supabase || typeof window.supabase.createClient !== "function") {
      document.getElementById("message").textContent =
        "⚠️ Supabase library failed to load. Check your internet connection and refresh.";
      document.getElementById("message").className = "err";
    }

    const $ = id => document.getElementById(id);
    const supabaseUrlInput = $("supabaseUrl");
    const supabaseKeyInput = $("supabaseKey");
    const emailInput       = $("email");
    const passwordInput    = $("password");
    const signinBtn        = $("signinBtn");
    const signupBtn        = $("signupBtn");
    const statusPill       = $("statusPill");
    const messageBox       = $("message");

    let client = null;

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = type === "ok" ? "ok" : "err";
    }

    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "";
    }

    function setLoading(on) {
      signinBtn.disabled = on;
      signupBtn.disabled = on;
      signinBtn.textContent = on ? "Please wait…" : "Sign in";
    }

    function ensureClient() {
      const url = supabaseUrlInput.value.trim();
      const key = supabaseKeyInput.value.trim();

      if (!url || !key) {
        showMessage("Enter both Supabase URL and anon key before continuing.", "err");
        return null;
      }

      if (!url.startsWith("https://")) {
        showMessage("Supabase URL must start with https://", "err");
        return null;
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        showMessage("Supabase library is not available. Refresh the page.", "err");
        return null;
      }

      try {
        client = window.supabase.createClient(url, key);
        return client;
      } catch (e) {
        showMessage("Could not create Supabase client: " + e.message, "err");
        return null;
      }
    }

    async function handleSignIn() {
      clearMessage();
      const sb = ensureClient();
      if (!sb) return;

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Enter your email and password.", "err");
        return;
      }

      setLoading(true);
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          showMessage("Sign-in failed: " + error.message, "err");
          statusPill.textContent = "Logged out";
          return;
        }

        showMessage("✓ Signed in as " + data.user.email, "ok");
        statusPill.textContent = "Logged in";
      } catch (e) {
        showMessage("Unexpected error: " + e.message, "err");
        statusPill.textContent = "Logged out";
      } finally {
        setLoading(false);
        signinBtn.textContent = "Sign in";
      }
    }

    async function handleSignUp() {
      clearMessage();
      const sb = ensureClient();
      if (!sb) return;

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Enter an email and password to create an account.", "err");
        return;
      }

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "err");
        return;
      }

      setLoading(true);
      signupBtn.disabled = true;
      signupBtn.textContent = "Creating…";

      try {
        const { data, error } = await sb.auth.signUp({ email, password });

        if (error) {
          showMessage("Sign-up failed: " + error.message, "err");
          statusPill.textContent = "Logged out";
          return;
        }

        // data.user is present even when email confirmation is pending
        if (data.user && data.session) {
          showMessage("✓ Account created and signed in as " + data.user.email, "ok");
          statusPill.textContent = "Logged in";
        } else if (data.user) {
          showMessage("✓ Account created for " + data.user.email + ". Check your email to confirm before signing in.", "ok");
          statusPill.textContent = "Pending confirmation";
        } else {
          showMessage("Sign-up may have succeeded — check your email.", "ok");
        }
      } catch (e) {
        showMessage("Unexpected error: " + e.message, "err");
        statusPill.textContent = "Logged out";
      } finally {
        setLoading(false);
        signupBtn.disabled = false;
        signupBtn.textContent = "Create account";
      }
    }

    signinBtn.addEventListener("click", e => { e.preventDefault(); handleSignIn(); });
    signupBtn.addEventListener("click", e => { e.preventDefault(); handleSignUp(); });
  </script>
</body>
</html>
