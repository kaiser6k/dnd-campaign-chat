<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>D&D Campaign Chat – Supabase Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Supabase via CDN (ESM) -->
  <script type="module">
    import { createClient } from "https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.esm.js";

    // Expose createClient globally so the main script can use it
    window._supabaseCreateClient = createClient;
  </script>

  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fbfbf9;
      --surface-2: #f3f0ec;
      --border: #d4d1ca;
      --text: #28251d;
      --text-muted: #7a7974;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06);
      max-width: 960px;
      width: 100%;
      padding: 24px 24px 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: 600;
      font-size: 18px;
    }

    .status-pill {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 8px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 8px;
    }

    label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    button.btn {
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
    }

    .btn.primary {
      background: var(--primary);
      color: #f9f8f4;
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      transform: translateY(-0.5px);
    }

    .btn.secondary {
      background: var(--surface-2);
      color: var(--text-muted);
    }

    .btn.secondary:hover {
      background: var(--surface-2);
      color: var(--text);
      transform: translateY(-0.5px);
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .help {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    #message {
      margin-top: 10px;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      display: none;
    }

    #message.ok {
      background: #d4dfcc;
      color: #1e3f0a;
    }

    #message.err {
      background: #e0ced7;
      color: #561740;
    }

    @media (max-width: 720px) {
      .card {
        margin: 16px;
        padding: 20px 16px 16px;
      }

      .grid-2 {
        grid-template-columns: minmax(0, 1fr);
      }

      .btn-row {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="card-header">
      <div class="card-title">D&D Campaign Chat</div>
      <div id="statusPill" class="status-pill">Logged out</div>
    </header>

    <section>
      <h2>Sign in or create account</h2>

      <div class="grid grid-2" style="margin-bottom: 8px;">
        <div>
          <label for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" type="url" placeholder="https://YOUR-REF.supabase.co" />
        </div>
        <div>
          <label for="supabaseKey">Anon (publishable) key</label>
          <input id="supabaseKey" type="text" placeholder="sb_publishable_..." />
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom: 4px;">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="signinBtn">Sign in</button>
        <button class="btn secondary" id="signupBtn">Create account</button>
      </div>

      <p class="help">
        Use email and password. This page talks directly to Supabase Auth; invites and admin actions are handled separately.
      </p>

      <div id="message"></div>
    </section>
  </main>

  <script>
    console.log("[DEBUG] Script loaded");

    const supabaseUrlInput = document.getElementById("supabaseUrl");
    const supabaseKeyInput = document.getElementById("supabaseKey");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const signinBtn = document.getElementById("signinBtn");
    const signupBtn = document.getElementById("signupBtn");
    const statusPill = document.getElementById("statusPill");
    const messageBox = document.getElementById("message");

    console.log("[DEBUG] signinBtn found?", !!signinBtn);
    console.log("[DEBUG] signupBtn found?", !!signupBtn);

    let supabase = null;

    function showMessage(text, type) {
      console.log("[DEBUG] showMessage:", type, text);
      messageBox.textContent = text;
      messageBox.className = "";
      messageBox.classList.add(type === "ok" ? "ok" : "err");
      messageBox.style.display = "block";
    }

    function setLoading(isLoading) {
      console.log("[DEBUG] setLoading:", isLoading);
      signinBtn.disabled = isLoading;
      signupBtn.disabled = isLoading;
    }

    function ensureClient() {
      const url = supabaseUrlInput.value.trim();
      const key = supabaseKeyInput.value.trim();

      console.log("[DEBUG] ensureClient called with url/key:", { url, keyPresent: !!key });

      if (!url || !key) {
        showMessage("Please enter both Supabase URL and anon key.", "err");
        return null;
      }

      if (!window._supabaseCreateClient) {
        console.error("[DEBUG] _supabaseCreateClient missing. CDN script may not have loaded.");
        showMessage("Supabase client is not available. Check the CDN script.", "err");
        return null;
      }

      try {
        supabase = window._supabaseCreateClient(url, key);
        console.log("[DEBUG] Supabase client created");
        return supabase;
      } catch (e) {
        console.error("[DEBUG] Error creating Supabase client:", e);
        showMessage("Failed to create Supabase client. Check URL and key.", "err");
        return null;
      }
    }

    async function handleSignIn() {
      console.log("[DEBUG] Sign in clicked");
      const client = ensureClient();
      if (!client) {
        console.log("[DEBUG] ensureClient returned null (sign in)");
        return;
      }

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      console.log("[DEBUG] Sign in email/password:", { email, hasPassword: !!password });

      if (!email || !password) {
        showMessage("Enter email and password to sign in.", "err");
        return;
      }

      setLoading(true);

      try {
        console.log("[DEBUG] Calling supabase.auth.signInWithPassword");
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        console.log("[DEBUG] Sign in response:", { data, error });

        if (error) {
          console.error("[DEBUG] Sign in error:", error);
          showMessage("Sign in failed: " + error.message, "err");
          statusPill.textContent = "Logged out";
          return;
        }

        showMessage("Signed in successfully.", "ok");
        statusPill.textContent = "Logged in";
      } catch (e) {
        console.error("[DEBUG] Sign in exception:", e);
        showMessage("Unexpected error during sign in.", "err");
        statusPill.textContent = "Logged out";
      } finally {
        setLoading(false);
      }
    }

    async function handleSignUp() {
      console.log("[DEBUG] Create account clicked");
      const client = ensureClient();
      if (!client) {
        console.log("[DEBUG] ensureClient returned null (sign up)");
        return;
      }

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      console.log("[DEBUG] Sign up email/password:", { email, hasPassword: !!password });

      if (!email || !password) {
        showMessage("Enter email and password to create an account.", "err");
        return;
      }

      setLoading(true);

      try {
        console.log("[DEBUG] Calling supabase.auth.signUp");
        const { data, error } = await client.auth.signUp({ email, password });
        console.log("[DEBUG] Sign up response:", { data, error });

        if (error) {
          console.error("[DEBUG] Sign up error:", error);
          showMessage("Sign up failed: " + error.message, "err");
          statusPill.textContent = "Logged out";
          return;
        }

        showMessage("Account created. Check your email if confirmation is required.", "ok");
        statusPill.textContent = "Logged in (or pending confirmation)";
      } catch (e) {
        console.error("[DEBUG] Sign up exception:", e);
        showMessage("Unexpected error during sign up.", "err");
        statusPill.textContent = "Logged out";
      } finally {
        setLoading(false);
      }
    }

    if (signinBtn) {
      signinBtn.addEventListener("click", (event) => {
        event.preventDefault();
        handleSignIn();
      });
    }

    if (signupBtn) {
      signupBtn.addEventListener("click", (event) => {
        event.preventDefault();
        handleSignUp();
      });
    }
  </script>
</body>
</html>
