<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>D&D Campaign Chat – Supabase Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Consider adding SRI and crossorigin attributes in production:
       <script src="..." integrity="sha384-..." crossorigin="anonymous"></script>
  -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fbfbf9;
      --surface-2: #f3f0ec;
      --border: #d4d1ca;
      --text: #28251d;
      --text-muted: #7a7974;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --error-bg: #e0ced7;
      --error-text: #561740;
      --ok-bg: #d4dfcc;
      --ok-text: #1e3f0a;
      --warn-bg: #e7d7c4;
      --warn-text: #4b2614;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
      max-width: 960px;
      width: 100%;
      padding: 24px 24px 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title { font-weight: 600; font-size: 18px; }

    .status-pill {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      transition: background 0.2s, color 0.2s;
    }
    .status-pill.ok { background: var(--ok-bg); color: var(--ok-text); border-color: #b3c9a8; }

    h2 { font-size: 22px; margin-bottom: 16px; }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    input:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    button.btn {
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
    }

    .btn.primary { background: var(--primary); color: #f9f8f4; }
    .btn.primary:hover { background: var(--primary-hover); transform: translateY(-0.5px); }
    .btn.secondary { background: var(--surface-2); color: var(--text-muted); }
    .btn.secondary:hover { color: var(--text); transform: translateY(-0.5px); }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .help {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    #message {
      margin-top: 10px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
      word-break: break-word;
      line-height: 1.5;
    }
    #message.ok  { background: var(--ok-bg);   color: var(--ok-text);   display: block; }
    #message.err { background: var(--error-bg); color: var(--error-text); display: block; }
